<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - HomeLoop</title>
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="login-container">
    <div class="logo-text">HomeLoop</div>
    <h1 class="welcome-text">Set New Password</h1>
    <p class="subtitle">Enter your new password below</p>

    <form class="login-form" id="resetForm">
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" placeholder="Enter new password" required minlength="6">
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="6">
      </div>

      <button type="submit" class="login-btn">
        <i class="fas fa-lock"></i> Reset Password
      </button>
    </form>

    <div id="statusMessage" style="display:none; text-align:center; 
         margin-top:15px; padding:12px; border-radius:8px; font-size:0.95rem;"></div>
  </div>

  <script src="config.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
