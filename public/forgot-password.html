<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - HomeLoop</title>
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="login-container">
    <div class="logo-text">HomeLoop</div>
    <h1 class="welcome-text">Forgot Password?</h1>
    <p class="subtitle">Enter your email and we'll send you a reset link</p>

    <form class="login-form" id="forgotForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>

      <button type="submit" class="login-btn">
        <i class="fas fa-paper-plane"></i> Send Reset Link
      </button>
    </form>

    <div id="statusMessage" style="display:none; text-align:center; 
         margin-top:15px; padding:12px; border-radius:8px; font-size:0.95rem;"></div>

    <div class="signup-section" style="margin-top: 20px;">
      <p><a href="login.html" class="signup-link">← Back to Login</a></p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="forgot-password.js"></script>
</body>
</html>
